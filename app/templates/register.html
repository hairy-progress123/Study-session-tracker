{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-panel">
    <div class="auth-header">
        <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
        <h1>Create Account</h1>
        <p>Start your focused journey today</p>
    </div>

    <form class="auth-form" method="POST" action="">
        <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="username" name="username" required autofocus placeholder="Choose a username">
            </div>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" required placeholder="Create a password">
            </div>
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <div class="input-wrapper">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="confirm_password" name="confirm_password" required
                    placeholder="Confirm your password">
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Register</button>
    </form>

    <div class="auth-footer">
        <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a></p>
    </div>
</div>
{% endblock %}
